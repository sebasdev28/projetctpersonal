<section class="page-not-found-view" aria-label="Page not found view">
  <mat-card>
    <mat-card-content>
      <h1>Page Not Found</h1>

      <p>
        The route <strong>{{ invalidPath }}</strong> was not found.
      </p>

      <a mat-flat-button color="primary" routerLink="/home" aria-label="Return to Home">
        Return to Home

    </mat-card-content>
  </mat-card>
</section>
